joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:
    axis_linear:
      x: 1
    scale_linear:
      x: 5.0
    scale_linear_turbo:
      x: 11.1

    axis_angular:
      yaw: 3
    scale_angular:
      yaw: 0.4
    scale_angular_turbo:
      yaw: 1.0

    enable_button: 5
    turbo_button: 6

    require_enable_button: true