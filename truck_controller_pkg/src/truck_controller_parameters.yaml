  position_feedback: {
    type: bool,
    default_value: false,
    description: "Choice of feedback type, if position_feedback is false then ``HW_IF_VELOCITY`` is taken as interface type, if
    position_feedback is true then ``HW_IF_POSITION`` is taken as interface type",
    read_only: false,
  }

  full_traction: {
    type: bool,
    default_value: false,
    description: "Whether the robot has traction on all wheels or not. If true, the robot is expected to have traction on all wheels, otherwise only on rear wheels.",
    read_only: false,
  }

  steering_limit: {
    type: double,
    default_value: 0.5,
    description: "Maximum steering angle (in radians) of front wheels.",
    validation: {
      gt<>: [0.0]
    }
  }


  app_point_offset: {
    type: double,
    default_value: 0.0,
    description: "Offset of the application point from the center of the robot.",
    validation: {
      gt_eq<>: [0.0]
    }
  }