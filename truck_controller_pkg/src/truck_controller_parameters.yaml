  rear_wheel_separation: {
    type: double,
    description: "Shortest distance between the left and right rear wheels. If this parameter is wrong, the robot will not behave correctly in curves.",
    validation: {
      gt<>: [0.0]
    }
  }

  front_wheel_separation: {
    type: double,
    description: "Shortest distance between the left and right front wheels. If this parameter is wrong, the robot will not behave correctly in curves.",
    validation: {
      gt<>: [0.0]
    }
  }

  wheel_radius: {
    type: double,
    description: "Radius of a wheel, i.e., wheels size, used for transformation of linear velocity into wheel rotations. If this parameter is wrong the robot will move faster or slower than expected.",
    validation: {
      gt<>: [0.0]
    }
  }

  front_wheel_base: {
    type: double,
    description: "Shortest distance between the two front axes. If this parameter is wrong, affects traction and steering behaviour.",
    validation: {
      gt<>: [0.0]
    }
  }

  central_wheel_base: {
    type: double,
    description: "Shortest distance between the two central axes. If this parameter is wrong, affects traction and steering behaviour.",
    validation: {
      gt<>: [0.0]
    }
  }

  rear_wheel_base: {
    type: double,
    description: "Shortest distance between the two rear axes. If this parameter is wrong, affects traction and steering behaviour.",
    validation: {
      gt<>: [0.0]
    }
  }

